services:
  app:
    build:
      args:
        user: sammy
        uid: 1000
      context: ./
      dockerfile: ./Dockerfile
    image: app-back
    container_name: app-back
    restart: unless-stopped
    env_file:
      - .env
    working_dir: /var/www/
    volumes:
      - ./backend:/var/www
      - ./.env:/var/www/.env
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - app-network

  front:
    image: node:24-alpine
    container_name: app-front
    restart: unless-stopped
    working_dir: /app
    # Instala dependencias y arranca el servidor de desarrollo
    command: sh -c "rm -rf node_modules/.package-lock.json && npm install && npm start"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - app-network

  db:
    image: mysql:5.7
    platform: linux/amd64
    container_name: app-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - ./backend/docker-compose/mysql:/docker-entrypoint-initdb.d
    networks:
      - app-network
  
  nginx:
    image: nginx:1.17-alpine
    platform: linux/amd64
    container_name: app-nginx
    restart: unless-stopped
    ports:
      - 8000:80
    volumes:
      - ./backend:/var/www
      - ./backend/docker-compose/nginx:/etc/nginx/conf.d
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
